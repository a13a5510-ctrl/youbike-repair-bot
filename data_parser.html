<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數據對齊與趨勢引擎 (異常敘述偵測版)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --bg-color: #0b1120;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --warning-color: #f59e0b;
            --danger-color: #f43f5e;
            --border-color: #334155;
            --success-color: #10b981;
            --trend-up: #ef4444; 
            --trend-down: #10b981; 
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 20px;
            max-width: 1600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        h1 { color: var(--accent-color); border-bottom: 2px solid var(--border-color); padding-bottom: 10px; }
        
        .control-panel {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"], input[type="number"] {
            background-color: #0f172a;
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
        }

        button {
            background-color: var(--accent-color);
            color: #0f172a;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: #0284c7; color: white;}

        /* 🌟 新增按鈕專屬顏色 */
        .btn-success { background-color: var(--success-color); color: white; }
        .btn-success:hover { background-color: #059669; }
        
        .btn-primary { background-color: #3b82f6; color: white; }
        .btn-primary:hover { background-color: #2563eb; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: var(--panel-bg);
            font-size: 0.85em; 
            text-align: center;
        }

        th, td {
            padding: 8px 4px;
            border: 1px solid var(--border-color);
            white-space: nowrap; 
        }

        th { background-color: #0f172a; color: var(--text-primary); font-weight: 600; }
        
        .group-total { background-color: rgba(56, 189, 248, 0.1); }
        .group-a { background-color: rgba(245, 158, 11, 0.05); }
        .group-b { background-color: rgba(245, 158, 11, 0.15); }
        .group-c { background-color: rgba(244, 63, 94, 0.15); }
        
        th.group-total { border-top: 3px solid #38bdf8; color: #38bdf8;}
        th.group-a { border-top: 3px solid #fbbf24; color: #fbbf24;}
        th.group-b { border-top: 3px solid #f59e0b; color: #f59e0b;}
        th.group-c { border-top: 3px solid #f43f5e; color: #f43f5e;}

        .trend-up { color: var(--trend-up); font-weight: bold; }
        .trend-down { color: var(--trend-down); font-weight: bold; }
        .trend-flat { color: var(--text-secondary); }
        .data-prev { color: var(--text-secondary); font-size: 0.9em; }

        .problems-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed var(--border-color);
        }
        .problems-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .problem-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .problem-card h4 {
            margin: 0 0 10px 0;
            color: var(--text-primary);
            font-size: 1.1em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 5px;
        }
        .prob-row {
            margin-bottom: 8px;
            font-size: 0.9em;
            line-height: 1.4;
        }
        .prob-label { font-weight: bold; display: block; margin-bottom: 2px; }
        .label-a { color: #fbbf24; }
        .label-b { color: #f59e0b; }
        .label-c { color: #f43f5e; }
        .prob-text { color: var(--text-secondary); }

        .output-panel { margin-top: 30px; }
        .output-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        textarea {
            width: 100%;
            height: 200px;
            background-color: #0f172a;
            color: var(--success-color);
            border: 1px solid var(--border-color);
            padding: 15px;
            font-family: monospace;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>數據對齊與趨勢引擎 🚀 (含異常敘述擷取)</h1>
    
    <div class="control-panel">
        <div>
            <label>1. 載入原始報表 (CSV): </label>
            <input type="file" id="csvFileInput" accept=".csv">
        </div>
        <div>
            <label>2. 目標月份 (本月): </label>
            <input type="number" id="monthFilter" value="4" min="1" max="12">
        </div>
        <button onclick="processData()">▶ 執行趨勢與異常運算</button>
    </div>

    <div id="tableContainer"></div>
    
    <div id="problemsContainer" class="problems-container" style="display: none;">
        <h3 style="color: var(--accent-color); margin-bottom: 5px;">🔍 本月各區主要異常敘述 (Top 3)</h3>
        <p style="color: var(--text-secondary); font-size: 0.9em; margin-top: 0;">自動抓取 CSV 欄位，排除基本資料後進行排序</p>
        <div id="problemsGrid" class="problems-grid"></div>
    </div>

    <div class="output-panel">
        <div class="output-header">
            <h3 style="margin: 0;">📋 最終轉換 JSON (請複製到 sim_data.js)</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn-success" onclick="copyJson()">📋 一鍵複製 JSON</button>
                <button class="btn-primary" onclick="downloadJson()">⬇️ 下載 JSON 檔案</button>
            </div>
        </div>
        <textarea id="jsonOutput" readonly></textarea>
    </div>

    <script>
        let rawData = [];
        let problemColumns = []; // 用來存儲被判定為「異常問題」的欄位名稱

        const targetRegionOrder = [
            "雙北", "桃園", "新竹", "苗栗", "台中", 
            "彰化", "雲林", "嘉義", "台南", "高雄", "屏東"
        ];

        // 非異常敘述的 Metadata 欄位，解析時會將其排除
        const metadataCols = [
            "地區", "月份", "A級", "B級", "C級", "編號", "公號", 
            "測驗日期", "城市", "車號", "車柱柱號", "一級檢修日期", 
            "一級檢修人員", "一級異常", "車輛異常", "一級維修異常", "總計"
        ];

        // 天網字典
        const GRADING_RULES = [
            { grade: 'a', keywords: ['滑落無法固定', '分離', '不亮', '無提示音', '無法發出鈴聲', '煞車失靈', '變形'] },
            { grade: 'b', keywords: ['髒污', '髒汙', '塗鴉', '廣告', '褪色', '異音', '偏擺', '龜裂', '不順', '搖晃', '歪斜'] },
            { grade: 'c', keywords: ['垃圾', '貼紙', '掉漆', '脫漆', '鏽蝕', '泥除'] }
        ];

        // 自動分級鑑定器
        function autoGradeIssue(issueString) {
            for (let rule of GRADING_RULES) {
                for (let kw of rule.keywords) {
                    if (issueString.includes(kw)) {
                        return rule.grade; 
                    }
                }
            }
            return 'c'; 
        }

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            Papa.parse(file, {
                header: false, 
                skipEmptyLines: true,
                complete: function(results) {
                    const allRows = results.data;
                    let headerIndex = -1;
                    let headers = [];

                    for (let i = 0; i < allRows.length; i++) {
                        if (allRows[i].includes('地區') && allRows[i].includes('月份')) {
                            headerIndex = i;
                            headers = allRows[i].map(h => h ? h.trim() : '');
                            break;
                        }
                    }

                    if (headerIndex === -1) {
                        alert("❌ 找不到包含 '地區' 與 '月份' 的標題列，請確認 CSV 格式！");
                        return;
                    }

                    problemColumns = headers.filter(h => h && !metadataCols.includes(h));

                    rawData = [];
                    for (let i = headerIndex + 1; i < allRows.length; i++) {
                        let rowObj = {};
                        for (let j = 0; j < headers.length; j++) {
                            const key = headers[j] || `未命名欄位_${j}`;
                            rowObj[key] = allRows[i][j];
                        }
                        rawData.push(rowObj);
                    }
                    alert(`✅ CSV 解析成功！共掃描到 ${problemColumns.length} 種異常項目。請點擊「執行趨勢與異常運算」。`);
                }
            });
        });

        function getTrend(current, prev, isPercent = false) {
            const diff = current - prev;
            if (diff === 0) return `<span class="trend-flat">-</span>`;
            const sign = diff > 0 ? "+" : "";
            const valStr = isPercent ? diff.toFixed(1) + "%" : diff;
            if (diff > 0) return `<span class="trend-up">${sign}${valStr}</span>`;
            return `<span class="trend-down">${valStr}</span>`;
        }

        function generateFinalTopProblems(cityCurrentData) {
            let top_problems = {};
            ['a', 'b', 'c'].forEach(grade => {
                let issues = cityCurrentData['prob' + grade.toUpperCase()]; 
                if (issues && Object.keys(issues).length > 0) {
                    let sorted = Object.entries(issues)
                        .sort((a, b) => b[1] - a[1]) 
                        .slice(0, 3); 
                    top_problems[grade] = sorted.map(p => `${p[0]}(${p[1]})`).join('、');
                } else {
                    top_problems[grade] = "目前無具體問題紀錄";
                }
            });
            return top_problems;
        }

        function processData() {
            if (rawData.length === 0) {
                alert("請先選擇 CSV 檔案並等待解析完成！");
                return;
            }

            const targetMonthNum = parseInt(document.getElementById('monthFilter').value);
            const prevMonthNum = targetMonthNum === 1 ? 12 : targetMonthNum - 1;
            const targetMonthStr = targetMonthNum.toString();
            const prevMonthStr = prevMonthNum.toString();

            const stats = {};

            rawData.forEach(row => {
                const region = (row['地區'] || '').trim();
                const month = (row['月份'] || '').trim();

                if (!region || region === '') return;
                if (month !== targetMonthStr && month !== prevMonthStr) return;

                if (!stats[region]) {
                    stats[region] = {
                        current: { total: 0, a: 0, b: 0, c: 0, probA: {}, probB: {}, probC: {} },
                        prev: { total: 0, a: 0, b: 0, c: 0 }
                    };
                }

                const valA = (row['A級'] || '').toString().toUpperCase();
                const valB = (row['B級'] || '').toString().toUpperCase();
                const valC = (row['C級'] || '').toString().toUpperCase();
                const isA = valA.includes('V') || valA.includes('O') || valA.includes('1');
                const isB = valB.includes('V') || valB.includes('O') || valB.includes('1');
                const isC = valC.includes('V') || valC.includes('O') || valC.includes('1');

                const targetBucket = (month === targetMonthStr) ? stats[region].current : stats[region].prev;

                targetBucket.total += 1;
                if (isA) targetBucket.a += 1;
                if (isB) targetBucket.b += 1;
                if (isC) targetBucket.c += 1;

                if (month === targetMonthStr) {
                    problemColumns.forEach(pCol => {
                        const cellVal = (row[pCol] || '').toString().toUpperCase();
                        if (cellVal.includes('V') || cellVal.includes('O') || cellVal.includes('1')) {
                            let realGrade = autoGradeIssue(pCol); 
                            let targetProbObj = 'prob' + realGrade.toUpperCase(); 
                            targetBucket[targetProbObj][pCol] = (targetBucket[targetProbObj][pCol] || 0) + 1;
                        }
                    });
                }
            });

            renderUI(stats, targetMonthNum, prevMonthNum);
        }

        function renderUI(stats, mCurrent, mPrev) {
            let tableHtml = `
                <table>
                    <thead>
                        <tr>
                            <th rowspan="2" style="background:#0f172a;">地區</th>
                            <th colspan="3" class="group-total">總檢修車數</th>
                            <th colspan="4" class="group-a">A級 狀態對比</th>
                            <th colspan="4" class="group-b">B級 狀態對比</th>
                            <th colspan="4" class="group-c">C級 狀態對比</th>
                        </tr>
                        <tr>
                            <th class="group-total">本月(${mCurrent}月)</th>
                            <th class="group-total">上月(${mPrev}月)</th>
                            <th class="group-total">增減</th>
                            
                            <th class="group-a">本月數量</th>
                            <th class="group-a">上月數量</th>
                            <th class="group-a">本月佔比</th>
                            <th class="group-a">佔比增減</th>

                            <th class="group-b">本月數量</th>
                            <th class="group-b">上月數量</th>
                            <th class="group-b">本月佔比</th>
                            <th class="group-b">佔比增減</th>

                            <th class="group-c">本月數量</th>
                            <th class="group-c">上月數量</th>
                            <th class="group-c">本月佔比</th>
                            <th class="group-c">佔比增減</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            const sortedRegions = Object.keys(stats).sort((a, b) => {
                let indexA = targetRegionOrder.findIndex(target => a.includes(target));
                let indexB = targetRegionOrder.findIndex(target => b.includes(target));
                if (indexA === -1) indexA = 999;
                if (indexB === -1) indexB = 999;
                return indexA - indexB;
            });

            let problemsHtml = ''; 
            const orderedStatsArray = []; 

            for (const reg of sortedRegions) {
                const cur = stats[reg].current;
                const prv = stats[reg].prev;

                const curRA = cur.total > 0 ? (cur.a / cur.total * 100) : 0;
                const prvRA = prv.total > 0 ? (prv.a / prv.total * 100) : 0;
                const curRB = cur.total > 0 ? (cur.b / cur.total * 100) : 0;
                const prvRB = prv.total > 0 ? (prv.b / prv.total * 100) : 0;
                const curRC = cur.total > 0 ? (cur.c / cur.total * 100) : 0;
                const prvRC = prv.total > 0 ? (prv.c / prv.total * 100) : 0;

                tableHtml += `
                    <tr>
                        <td style="font-weight:bold;">${reg}</td>
                        <td class="group-total">${cur.total.toLocaleString()}</td>
                        <td class="group-total data-prev">${prv.total.toLocaleString()}</td>
                        <td class="group-total">${getTrend(cur.total, prv.total, false)}</td>
                        
                        <td class="group-a">${cur.a}</td>
                        <td class="group-a data-prev">${prv.a}</td>
                        <td class="group-a">${curRA.toFixed(1)}%</td>
                        <td class="group-a">${getTrend(curRA, prvRA, true)}</td>

                        <td class="group-b">${cur.b}</td>
                        <td class="group-b data-prev">${prv.b}</td>
                        <td class="group-b">${curRB.toFixed(1)}%</td>
                        <td class="group-b">${getTrend(curRB, prvRB, true)}</td>

                        <td class="group-c" style="font-weight:bold;">${cur.c}</td>
                        <td class="group-c data-prev">${prv.c}</td>
                        <td class="group-c" style="font-weight:bold;">${curRC.toFixed(1)}%</td>
                        <td class="group-c">${getTrend(curRC, prvRC, true)}</td>
                    </tr>
                `;

                const topProbs = generateFinalTopProblems(cur);

                problemsHtml += `
                    <div class="problem-card">
                        <h4>📍 ${reg}</h4>
                        <div class="prob-row"><span class="prob-label label-a">A級常見:</span><span class="prob-text">${topProbs.a}</span></div>
                        <div class="prob-row"><span class="prob-label label-b">B級常見:</span><span class="prob-text">${topProbs.b}</span></div>
                        <div class="prob-row"><span class="prob-label label-c">C級常見:</span><span class="prob-text">${topProbs.c}</span></div>
                    </div>
                `;

                orderedStatsArray.push({ 
                    region: reg, 
                    current_month: {
                        total: cur.total, a: cur.a, b: cur.b, c: cur.c,
                        top_problems: topProbs
                    }, 
                    prev_month: { total: prv.total, a: prv.a, b: prv.b, c: prv.c } 
                });
            }
            
            tableHtml += `</tbody></table>`;
            document.getElementById('tableContainer').innerHTML = tableHtml;

            document.getElementById('problemsContainer').style.display = 'block';
            document.getElementById('problemsGrid').innerHTML = problemsHtml;

            // 輸出給 sim_data.js 使用的標準格式
            const finalOutput = `const simJsonData = ${JSON.stringify(orderedStatsArray, null, 4)};`;
            document.getElementById('jsonOutput').value = finalOutput;
        }

        // 🌟 魔法：一鍵複製
        function copyJson() {
            const jsonText = document.getElementById('jsonOutput').value;
            if (!jsonText) {
                alert("⚠️ 請先載入 CSV 並點擊「執行趨勢與異常運算」！");
                return;
            }
            
            // 由於安全性考量，使用最新的 clipboard API
            navigator.clipboard.writeText(jsonText).then(() => {
                alert("✅ JSON 數據已成功複製！請直接去貼上覆蓋 sim_data.js 內容。");
            }).catch(err => {
                console.error('複製失敗:', err);
                alert("❌ 複製失敗，請手動在框內全選並複製 (Ctrl+C)。");
            });
        }

        // 🌟 魔法：一鍵下載
        function downloadJson() {
            const jsonText = document.getElementById('jsonOutput').value;
            if (!jsonText) {
                alert("⚠️ 請先載入 CSV 並點擊「執行趨勢與異常運算」！");
                return;
            }

            const month = document.getElementById('monthFilter').value;
            const fileName = `本月模擬體驗數據_${month}月.js`;

            const blob = new Blob([jsonText], { type: "text/javascript;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
