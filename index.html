<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>維修維護提升改善會議 2026/04 資訊</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="light-mode">

    <div class="header">
        <h1>維修維護提升改善會議 2026/04 資訊</h1>
        <div class="header-tools">
            <div class="slider-container" title="調整地圖與圖表的左右比例">
                <span class="slider-icon">🗺️</span>
                <input type="range" id="layoutSlider" min="30" max="70" step="1" value="50">
                <span class="slider-icon">📊</span>
            </div>

            <div class="slider-container" title="調整整體畫面與字體大小">
                <span class="slider-btn" onclick="adjustZoom(2.0)">A+</span>
                <input type="range" id="fontSizeSlider" min="0.8" max="2.0" step="0.1" value="1" dir="rtl">
                <span class="slider-btn" onclick="adjustZoom(0.8)">A-</span>
            </div>

            <button class="laser-toggle" id="laserToggleBtn" title="開啟雷射筆效果">🔴 雷射筆</button>
            <button class="presentation-toggle" id="presentationToggleBtn" title="進入/退出全螢幕投影 (F11)">📺 投影模式</button>
            <button id="themeToggleBtn">🌙 深色模式</button>
        </div>
    </div>

    <div class="top-nav zoom-target">
        <button class="active" id="nav-stats">施測數據統計</button>
        <button id="nav-tire">前後胎壓未達標準(6M)</button>
        <button id="nav-operability">各縣市場站可動率</button>
        <button id="nav-maintenance">車輛事故與一級維護</button>
        <button id="nav-simulation">本月模擬體驗數據</button>
    </div>

    <div class="controls zoom-target" id="button-container"></div>

    <div class="dashboard" id="main-dashboard">
        <div class="panel map-panel" id="map-panel-container">
            <button id="mapDataToggleBtn" class="map-data-toggle hidden zoom-target">📋 切換數據報表</button>
            <div id="data-view-container" class="data-view-container hidden zoom-target"></div>
            <div class="legend-box zoom-target" id="legend-box-content"></div>
            
            <div class="floating-base-metrics zoom-target" id="floating-stats-area">
                <div style="font-size: 14px; font-weight: bold; margin-bottom: 10px; color: var(--text-primary); text-align: center; border-bottom: 1px solid var(--border-color); padding-bottom: 5px;">全國總計基礎施測數據 (2026/04)</div>
                <div class="base-metrics-grid grid-cols-2">
                    <div class="metric-card"><div class="metric-title">施測站數</div><div class="metric-value">287 站</div></div>
                    <div class="metric-card"><div class="metric-title">施測車輛總數</div><div class="metric-value">2019 輛</div></div>
                    <div class="metric-card"><div class="metric-title">2.0E 施測車數</div><div class="metric-value">325 輛</div></div>
                    <div class="metric-card alert"><div class="metric-title">前後胎壓未達標</div><div class="metric-value">83 輛 (4.1%)</div></div>
                </div>
            </div>

            <div class="city-detail-panel zoom-target" id="cityDetailPanel">
                <h4 id="detail-title">選擇縣市</h4>
                <div id="detail-content"></div>
            </div>
            <div id="loading" class="loading-text">載入衛星地圖數據中...</div>
            <div id="mapChart" class="chart-container" style="opacity: 0; transition: opacity 0.5s;"></div>
        </div>

        <div class="panel chart-panel" id="right-chart-panel" style="overflow-y: auto; position: relative;">
            
            <button id="varianceToggleBtn" class="variance-toggle-btn zoom-target hidden">🔄 切換為：較上月變動</button>

            <div class="base-metrics-wrapper hidden zoom-target" id="maintenance-metrics-area">
                <div style="font-size: 15px; font-weight: bold; margin-bottom: 5px; color: var(--text-secondary);">全國營運車輛數對比 <span id="fleet-title-hint" onclick="toggleFleetDetails()" style="font-size: 12px; color: var(--accent-color); cursor: pointer;">(點擊展開各縣市明細)</span></div>
                <div id="fleet-summary" class="base-metrics-grid grid-cols-2 cursor-pointer" onclick="toggleFleetDetails()">
                    <div class="metric-card hover-glow"><div class="metric-title">2026/03 總營運車輛數</div><div class="metric-value" style="color: var(--text-secondary);">107,772 輛</div></div>
                    <div class="metric-card hover-glow"><div class="metric-title">2026/04 總營運車輛數</div><div class="metric-value">108,672 輛</div></div>
                </div>
                <div id="fleet-details" class="hidden cursor-pointer" onclick="toggleFleetDetails()"><div class="base-metrics-grid grid-cols-5" id="fleet-detail-grid"></div></div>
            </div>

            <div class="base-metrics-wrapper hidden zoom-target" id="simulation-metrics-area">
                <div style="font-size: 15px; font-weight: bold; margin-bottom: 5px; color: var(--text-secondary);">全國異常車輛數總計 <span id="sim-title-hint" onclick="toggleSimDetails()" style="font-size: 12px; color: var(--accent-color); cursor: pointer;">(點擊展開各縣市數量)</span></div>
                <div id="sim-summary" class="base-metrics-grid cursor-pointer" style="grid-template-columns: 1fr;" onclick="toggleSimDetails()">
                    <div class="metric-card hover-glow"><div class="metric-title">2026/04 本月異常總數量</div><div class="metric-value">2,039 輛</div></div>
                </div>
                <div id="sim-details" class="hidden cursor-pointer" onclick="toggleSimDetails()"><div class="base-metrics-grid grid-cols-5" id="sim-detail-grid"></div></div>
            </div>

            <div id="barChart" class="chart-container"></div>

            <div id="maintenance-info-area" class="hidden zoom-target" style="flex: 1; padding: 10px;">
                <h3 style="color: var(--text-primary); margin-top: 0; margin-bottom: 15px;">一級維修 檢測與行動方案說明</h3>
                </div>
        </div>
    </div>

    <div id="simModal" class="modal-overlay hidden">
        <div class="modal-content zoom-target">
            <h3 id="simModalTitle" style="color: var(--accent-color); margin-top: 0; border-bottom: 1px solid var(--border-color); padding-bottom: 10px;">異常問題分析</h3>
            <div id="simModalBody" style="font-size: 15px; line-height: 1.6; color: var(--text-primary); margin-top: 15px;"></div>
            <button class="modal-close-btn" onclick="document.getElementById('simModal').classList.add('hidden')">關閉</button>
        </div>
    </div>

    <div id="laser-dot" class="laser-dot"></div>

    <script src="js/data.js?v=1.7"></script>
    <script src="js/sim_data.js?v=1.0"></script> <script src="js/app.js?v=2.2"></script>
</body>
</html>
